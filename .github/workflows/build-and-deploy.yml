name: Build & Deploy to GitHub Pages

on:
  schedule:
    # every hour on the hour (UTC)
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [master]

# One deployment at a time; skip queued redundant runs but don't cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Fetch org data & build SPA
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch zenbuapps org data
        env:
          GH_TOKEN: ${{ secrets.ZENBU_ORG_READ_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::ZENBU_ORG_READ_TOKEN secret is not set. Create a Fine-grained PAT with read access to zenbuapps org (contents/issues/metadata) and add it as a repo secret."
            exit 1
          fi
          npm run fetch-data

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
